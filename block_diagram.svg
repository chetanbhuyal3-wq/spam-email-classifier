<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080c"/>
      <stop offset="100%" style="stop-color:#0f1018"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3d7fff"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#36e899"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#ff4444"/>
    </marker>
    <marker id="arrA" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#ffb03a"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="url(#bg2)" rx="16"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#dde3f0" font-size="16" font-weight="700" letter-spacing="1">SPAM EMAIL CLASSIFIER — BLOCK DIAGRAM</text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#1e2230" stroke-width="1"/>

  <!-- ─── BLOCK 1: Input ─── -->
  <rect x="36" y="160" width="110" height="70" rx="10" fill="#141720" stroke="#3d7fff" stroke-width="2"/>
  <text x="91" y="188" text-anchor="middle" fill="#3d7fff" font-size="11" font-weight="700">📧 INPUT</text>
  <text x="91" y="205" text-anchor="middle" fill="#8ab4ff" font-size="9">Raw Email</text>
  <text x="91" y="220" text-anchor="middle" fill="#8ab4ff" font-size="9">Text</text>

  <!-- Arrow 1→2 -->
  <line x1="146" y1="195" x2="175" y2="195" stroke="#3d7fff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── BLOCK 2: Preprocess ─── -->
  <rect x="175" y="140" width="120" height="110" rx="10" fill="#141720" stroke="#a78bfa" stroke-width="2"/>
  <text x="235" y="164" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">⚙ PREPROCESS</text>
  <text x="235" y="181" text-anchor="middle" fill="#c4b5fd" font-size="8">① Lowercase</text>
  <text x="235" y="196" text-anchor="middle" fill="#c4b5fd" font-size="8">② Remove punctuation</text>
  <text x="235" y="211" text-anchor="middle" fill="#c4b5fd" font-size="8">③ Remove stopwords</text>
  <text x="235" y="226" text-anchor="middle" fill="#c4b5fd" font-size="8">④ Normalize URLs/nums</text>
  <text x="235" y="241" text-anchor="middle" fill="#c4b5fd" font-size="8">⑤ Tokenize</text>

  <!-- Arrow 2→3 -->
  <line x1="295" y1="195" x2="325" y2="195" stroke="#3d7fff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="188" text-anchor="middle" fill="#5a637a" font-size="8">clean text</text>

  <!-- ─── BLOCK 3: TF-IDF ─── -->
  <rect x="325" y="140" width="130" height="110" rx="10" fill="#141720" stroke="#36e899" stroke-width="2"/>
  <text x="390" y="164" text-anchor="middle" fill="#36e899" font-size="11" font-weight="700">📊 TF-IDF</text>
  <text x="390" y="181" text-anchor="middle" fill="#5a9970" font-size="8">Vectorizer</text>
  <text x="390" y="198" text-anchor="middle" fill="#5a9970" font-size="8">ngram: (1,2)</text>
  <text x="390" y="213" text-anchor="middle" fill="#5a9970" font-size="8">max_features: 15,000</text>
  <text x="390" y="228" text-anchor="middle" fill="#5a9970" font-size="8">sublinear_tf: True</text>
  <text x="390" y="243" text-anchor="middle" fill="#5a9970" font-size="8">→ Numeric Matrix</text>

  <!-- Arrow 3→4 -->
  <line x1="455" y1="195" x2="485" y2="195" stroke="#36e899" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="470" y="188" text-anchor="middle" fill="#5a637a" font-size="8">vectors</text>

  <!-- ─── BLOCK 4: Naive Bayes ─── -->
  <rect x="485" y="140" width="130" height="110" rx="10" fill="#141720" stroke="#36e899" stroke-width="2"/>
  <text x="550" y="164" text-anchor="middle" fill="#36e899" font-size="11" font-weight="700">🧠 NAIVE BAYES</text>
  <text x="550" y="181" text-anchor="middle" fill="#5a9970" font-size="8">MultinomialNB</text>
  <text x="550" y="198" text-anchor="middle" fill="#5a9970" font-size="8">alpha = 0.1</text>
  <text x="550" y="213" text-anchor="middle" fill="#5a9970" font-size="8">P(spam|word₁…wordₙ)</text>
  <text x="550" y="228" text-anchor="middle" fill="#5a9970" font-size="8">Bayes Theorem</text>
  <text x="550" y="243" text-anchor="middle" fill="#5a9970" font-size="8">→ Probabilities</text>

  <!-- Arrow 4→5 -->
  <line x1="615" y1="195" x2="645" y2="195" stroke="#36e899" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="630" y="188" text-anchor="middle" fill="#5a637a" font-size="8">proba[]</text>

  <!-- ─── BLOCK 5: Predict ─── -->
  <rect x="645" y="155" width="115" height="80" rx="10" fill="#141720" stroke="#ffb03a" stroke-width="2"/>
  <text x="703" y="178" text-anchor="middle" fill="#ffb03a" font-size="11" font-weight="700">🎯 PREDICT</text>
  <text x="703" y="196" text-anchor="middle" fill="#997040" font-size="8">spam_prob %</text>
  <text x="703" y="211" text-anchor="middle" fill="#997040" font-size="8">ham_prob %</text>
  <text x="703" y="226" text-anchor="middle" fill="#997040" font-size="8">risk level</text>

  <!-- Arrow 5→ SPAM -->
  <line x1="760" y1="180" x2="800" y2="150" stroke="#ff4444" stroke-width="2" marker-end="url(#arrR)"/>

  <!-- ─── BLOCK SPAM ─── -->
  <rect x="800" y="110" width="80" height="60" rx="10" fill="#1a0a0a" stroke="#ff4444" stroke-width="2"/>
  <text x="840" y="137" text-anchor="middle" fill="#ff4444" font-size="10" font-weight="700">🚨 SPAM</text>
  <text x="840" y="154" text-anchor="middle" fill="#cc3333" font-size="8">⚠ Alert</text>
  <text x="840" y="165" text-anchor="middle" fill="#cc3333" font-size="8">popup</text>

  <!-- Arrow 5→ HAM -->
  <line x1="760" y1="210" x2="800" y2="240" stroke="#36e899" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- ─── BLOCK HAM ─── -->
  <rect x="800" y="220" width="80" height="60" rx="10" fill="#0a1a0f" stroke="#36e899" stroke-width="2"/>
  <text x="840" y="247" text-anchor="middle" fill="#36e899" font-size="10" font-weight="700">✅ SAFE</text>
  <text x="840" y="264" text-anchor="middle" fill="#1f8a50" font-size="8">✅ Safe</text>
  <text x="840" y="275" text-anchor="middle" fill="#1f8a50" font-size="8">popup</text>

  <!-- ─── TRAINING PATH (bottom) ─── -->
  <!-- Training data -->
  <rect x="175" y="320" width="120" height="60" rx="10" fill="#141710" stroke="#ffb03a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="235" y="345" text-anchor="middle" fill="#ffb03a" font-size="10" font-weight="700">📄 emails.csv</text>
  <text x="235" y="362" text-anchor="middle" fill="#997040" font-size="9">Training data</text>
  <text x="235" y="374" text-anchor="middle" fill="#997040" font-size="8">(label, text)</text>

  <line x1="235" y1="320" x2="235" y2="250" stroke="#ffb03a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrA)" opacity="0.6"/>
  <text x="250" y="295" fill="#997040" font-size="8">train()</text>

  <!-- Save pkl -->
  <rect x="385" y="320" width="130" height="60" rx="10" fill="#141710" stroke="#ffb03a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="345" text-anchor="middle" fill="#ffb03a" font-size="10" font-weight="700">💾 spam_model.pkl</text>
  <text x="450" y="362" text-anchor="middle" fill="#997040" font-size="9">Saved Pipeline</text>
  <text x="450" y="374" text-anchor="middle" fill="#997040" font-size="8">TF-IDF + NB weights</text>

  <line x1="450" y1="320" x2="490" y2="250" stroke="#ffb03a" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrA)" opacity="0.6"/>

  <!-- Section labels -->
  <rect x="36" y="56" width="140" height="22" rx="5" fill="rgba(61,127,255,0.1)" stroke="rgba(61,127,255,0.3)" stroke-width="1"/>
  <text x="106" y="71" text-anchor="middle" fill="#3d7fff" font-size="9" font-weight="700" letter-spacing="1">INFERENCE PIPELINE</text>

  <rect x="175" y="295" width="360" height="22" rx="5" fill="rgba(255,176,58,0.08)" stroke="rgba(255,176,58,0.3)" stroke-width="1"/>
  <text x="355" y="310" text-anchor="middle" fill="#ffb03a" font-size="9" font-weight="700" letter-spacing="1">TRAINING PIPELINE (offline, train_model.py)</text>

  <!-- Dotted boundary for inference -->
  <rect x="28" y="78" width="770" height="200" rx="12" fill="none" stroke="#3d7fff" stroke-width="1" stroke-dasharray="8,4" opacity="0.3"/>
</svg>
